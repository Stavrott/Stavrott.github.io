<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#090909" id="theme-meta">
  <meta name="description" content="Application de suivi de musculation">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Esse">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Esse</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div id="app" class="app">

    <!-- ── Écran d'authentification ────────────────────────────── -->
    <div id="auth-screen" class="auth-screen hidden">
      <div class="auth-container">

        <div class="auth-logo">
          <div class="auth-logo-icon">
            <img src="icons/logo.png" alt="Esse" class="auth-app-icon">
          </div>
          <h1>ESSE</h1>
        </div>

        <div class="auth-card">
          <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Connexion</button>
            <button class="tab-btn" data-tab="register">Inscription</button>
          </div>

          <form id="login-form" class="auth-form-body">
            <div class="form-group">
              <label class="form-label" for="login-email">Adresse e-mail</label>
              <input class="form-input auth-input" type="email" id="login-email" placeholder="vous@exemple.fr" required autocomplete="email">
            </div>
            <div class="form-group">
              <label class="form-label" for="login-password">Mot de passe</label>
              <input class="form-input auth-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-auth">Se connecter</button>
            <button type="button" class="btn btn-ghost btn-sm auth-forgot" id="btn-forgot-password">
              Mot de passe oublié ?
            </button>
          </form>

          <form id="register-form" class="auth-form-body hidden">
            <div class="form-group">
              <label class="form-label" for="register-name">Prénom</label>
              <input class="form-input auth-input" type="text" id="register-name" placeholder="Jean" required autocomplete="given-name">
            </div>
            <div class="form-group">
              <label class="form-label" for="register-email">Adresse e-mail</label>
              <input class="form-input auth-input" type="email" id="register-email" placeholder="vous@exemple.fr" required autocomplete="email">
            </div>
            <div class="form-group">
              <label class="form-label" for="register-password">Mot de passe</label>
              <input class="form-input auth-input" type="password" id="register-password" placeholder="6 caractères minimum" required autocomplete="new-password" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-auth">Créer mon compte</button>
          </form>

          <form id="reset-form" class="auth-form-body hidden">
            <p class="auth-reset-hint">
              Saisissez votre e-mail pour recevoir un lien de réinitialisation.
            </p>
            <div class="form-group">
              <label class="form-label" for="reset-email">Adresse e-mail</label>
              <input class="form-input auth-input" type="email" id="reset-email" placeholder="vous@exemple.fr" required autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-auth">Envoyer le lien</button>
            <button type="button" class="btn btn-ghost btn-sm auth-forgot" id="btn-back-login">
              ← Retour à la connexion
            </button>
          </form>

          <p id="auth-success" class="auth-success hidden"></p>
          <p id="auth-error"   class="auth-error hidden"></p>

          <div class="auth-demo-section hidden" id="auth-demo-section">
            <button class="btn btn-ghost btn-sm btn-demo" id="btn-demo">Mode démo</button>
          </div>
        </div>

      </div>
    </div>

    <!-- ── Onboarding ────────────────────────────────────────────── -->
    <div id="onboarding-screen" class="onboarding-screen hidden"></div>

    <!-- ── Application principale ──────────────────────────────── -->
    <div id="main-app" class="main-app hidden">

      <!-- Header -->
      <header class="app-header" id="app-header">
        <div class="header-left">
          <button id="back-btn" class="icon-btn hidden" aria-label="Retour">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
          </button>
          <span id="page-title" class="page-title">Esse</span>
        </div>
        <div class="header-right">
          <button id="appearance-btn" class="icon-btn" aria-label="Personnaliser l'apparence">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
              <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
              <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
              <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/>
              <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 011.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
            </svg>
          </button>
          <button id="user-menu-btn" class="icon-btn" aria-label="Menu utilisateur">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Contenu principal -->
      <main class="app-main" id="app-main">
        <section id="page-home"       class="page active" data-page="home"></section>
        <section id="page-seances"    class="page hidden" data-page="seances"></section>
        <section id="page-programmes" class="page hidden" data-page="programmes"></section>
        <section id="page-stats"      class="page hidden" data-page="stats"></section>
        <section id="page-nutrition"  class="page hidden" data-page="nutrition"></section>
        <section id="page-exercices"  class="page hidden" data-page="exercices"></section>
        <section id="page-profil"     class="page hidden" data-page="profil"></section>
      </main>

      <!-- Barres flottantes persistantes -->
      <div class="floating-bars" id="floating-bars">
        <button id="rest-timer-mini" class="floating-bar hidden" aria-label="Reprendre le minuteur de repos">
          <span class="asb-dot"></span>
          <span class="asb-info">
            <span class="asb-nom">Repos</span>
            <span class="asb-time" id="rtm-time">00:00</span>
          </span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="asb-arrow"><polyline points="9 18 15 12 9 6"/></svg>
        </button>

        <button id="active-seance-bar" class="floating-bar hidden" aria-label="Reprendre la séance en cours">
          <span class="asb-dot"></span>
          <span class="asb-info">
            <span class="asb-nom" id="asb-nom"></span>
            <span class="asb-time" id="asb-time">00:00</span>
          </span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="asb-arrow"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <!-- Navigation inférieure -->
      <nav class="bottom-nav" id="bottom-nav" role="navigation" aria-label="Navigation principale">
        <button class="nav-item active" data-page="home" aria-label="Accueil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Accueil</span>
        </button>
        <button class="nav-item" data-page="seances" aria-label="Séances">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 5v14M18 5v14M3 8h3m12 0h3M3 16h3m12 0h3"/>
          </svg>
          <span>Séances</span>
        </button>
        <button class="nav-item" data-page="stats" aria-label="Statistiques">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span>Stats</span>
        </button>
        <button class="nav-item" data-page="nutrition" aria-label="Nutrition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
          </svg>
          <span>Nutrition</span>
        </button>
        <button class="nav-item" data-page="exercices" aria-label="Exercices">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
          </svg>
          <span>Exercices</span>
        </button>
      </nav>

    </div>

    <!-- ── Menu utilisateur (drawer) ───────────────────────────── -->
    <div id="user-drawer" class="drawer hidden">
      <div class="drawer-overlay"></div>
      <div class="drawer-panel">
        <div class="drawer-header">
          <div class="user-avatar" id="drawer-avatar">A</div>
          <div>
            <p class="user-name" id="drawer-name">Utilisateur</p>
            <p class="user-email" id="drawer-email">—</p>
            <div id="drawer-profile-badges" style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"></div>
          </div>
        </div>
        <div class="drawer-body">
          <button class="drawer-item" id="btn-profil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Mon profil
          </button>
          <hr class="drawer-separator">
          <button class="drawer-item" id="btn-export">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exporter les données (JSON)
          </button>
          <button class="drawer-item" id="btn-import">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Importer des données (JSON)
          </button>
          <input type="file" id="import-file-input" accept=".json" class="hidden">
          <hr class="drawer-separator">
          <button class="drawer-item drawer-item-danger" id="btn-logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Se déconnecter
          </button>
        </div>
      </div>
    </div>

    <!-- ── Modal générique ─────────────────────────────────────── -->
    <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal" id="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title"></h2>
          <button class="icon-btn" id="modal-close" aria-label="Fermer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

    <!-- ── Timer de repos — bottom sheet ────────────────────────── -->
    <div id="timer-overlay" class="timer-overlay hidden">
      <div class="timer-backdrop" id="timer-backdrop"></div>
      <div class="timer-sheet">
        <button class="timer-handle-btn" id="timer-minimize" aria-label="Réduire le minuteur">
          <span class="timer-handle"></span>
        </button>
        <p class="timer-sheet-label">Temps de repos</p>

        <div class="timer-ring-wrap">
          <svg class="timer-ring-svg" viewBox="0 0 200 200">
            <defs>
              <linearGradient id="timerGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#C53300"/>
                <stop offset="55%"  stop-color="#F04500"/>
                <stop offset="100%" stop-color="#FF7200"/>
              </linearGradient>
            </defs>
            <circle class="timer-ring-track"  cx="100" cy="100" r="88"/>
            <circle class="timer-ring-fill"   cx="100" cy="100" r="88" id="timer-ring-fill"/>
          </svg>
          <div class="timer-ring-center">
            <div class="timer-display" id="timer-display">01:30</div>
            <p class="timer-status" id="timer-status">En cours</p>
          </div>
        </div>

        <div class="timer-controls">
          <button class="timer-adj-btn" id="timer-minus" aria-label="-15 secondes">−15s</button>
          <button class="timer-main-btn" id="timer-start-stop" aria-label="Pause/Reprendre">
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <svg class="icon-play hidden" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <button class="timer-adj-btn" id="timer-plus" aria-label="+15 secondes">+15s</button>
        </div>

        <button class="timer-skip-btn" id="timer-skip">Passer le repos</button>
      </div>
    </div>

    <!-- ── Overlay de chargement ───────────────────────────────── -->
    <div id="loading-overlay" class="loading-overlay hidden" aria-live="assertive">
      <div class="spinner"></div>
    </div>

  </div>

  <!-- ── Toasts — hors de #app pour rester toujours au premier plan ── -->
  <div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
