<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Gradient corps -->
    <radialGradient id="bodyGrad" cx="50%" cy="60%" r="55%">
      <stop offset="0%"   stop-color="#FFB340"/>
      <stop offset="40%"  stop-color="#FF5500"/>
      <stop offset="100%" stop-color="#CC1000"/>
    </radialGradient>
    <!-- Gradient ailes -->
    <linearGradient id="wingL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#AA1000"/>
    </linearGradient>
    <linearGradient id="wingR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#AA1000"/>
    </linearGradient>
    <!-- Gradient queue -->
    <linearGradient id="tailGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#FF6600"/>
      <stop offset="100%" stop-color="#881000" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Glow filtre -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Halo extérieur -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="rgba(255,90,0,0.18)" stroke-width="1"/>

  <!-- === QUEUE DE FLAMMES (bas) === -->
  <!-- Flamme centrale queue -->
  <path d="M100 165 C97 155 88 148 85 138 C82 128 86 118 100 115 C114 118 118 128 115 138 C112 148 103 155 100 165Z"
        fill="url(#tailGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- Flamme gauche queue -->
  <path d="M100 160 C93 150 78 145 72 133 C66 121 72 110 82 112 C89 114 94 122 100 130"
        fill="none" stroke="url(#tailGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Flamme droite queue -->
  <path d="M100 160 C107 150 122 145 128 133 C134 121 128 110 118 112 C111 114 106 122 100 130"
        fill="none" stroke="url(#tailGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Petites flammes queue -->
  <path d="M88 155 C82 143 76 138 78 128 C79 122 84 120 88 125"
        fill="none" stroke="#FF6600" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M112 155 C118 143 124 138 122 128 C121 122 116 120 112 125"
        fill="none" stroke="#FF6600" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- === AILE GAUCHE === -->
  <path d="M100 105
           C92 100 80 95 65 88
           C50 81 38 78 30 72
           C22 66 20 56 26 50
           C32 44 44 46 54 52
           C64 58 72 66 80 74
           C86 80 92 90 96 98Z"
        fill="url(#wingL)" filter="url(#glow)" opacity="0.95"/>
  <!-- Détails plumes aile gauche -->
  <path d="M96 98 C88 88 76 80 62 72 C48 64 36 60 28 58"
        fill="none" stroke="rgba(255,180,60,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M94 104 C84 96 70 90 55 84 C42 79 32 76 24 72"
        fill="none" stroke="rgba(255,180,60,0.4)" stroke-width="1" stroke-linecap="round"/>

  <!-- === AILE DROITE === -->
  <path d="M100 105
           C108 100 120 95 135 88
           C150 81 162 78 170 72
           C178 66 180 56 174 50
           C168 44 156 46 146 52
           C136 58 128 66 120 74
           C114 80 108 90 104 98Z"
        fill="url(#wingR)" filter="url(#glow)" opacity="0.95"/>
  <!-- Détails plumes aile droite -->
  <path d="M104 98 C112 88 124 80 138 72 C152 64 164 60 172 58"
        fill="none" stroke="rgba(255,180,60,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M106 104 C116 96 130 90 145 84 C158 79 168 76 176 72"
        fill="none" stroke="rgba(255,180,60,0.4)" stroke-width="1" stroke-linecap="round"/>

  <!-- === CORPS CENTRAL === -->
  <ellipse cx="100" cy="100" rx="22" ry="28" fill="url(#bodyGrad)" filter="url(#glow)"/>

  <!-- === TÊTE === -->
  <ellipse cx="100" cy="76" rx="14" ry="13" fill="url(#bodyGrad)" filter="url(#glow)"/>

  <!-- === CRÊTE / FLAMMES TÊTE === -->
  <!-- Flamme centrale crête -->
  <path d="M100 63 C99 54 95 46 98 38 C100 32 104 34 103 42 C102 50 101 57 100 63Z"
        fill="url(#bodyGrad)" filter="url(#glowStrong)" opacity="0.95"/>
  <!-- Flamme gauche crête -->
  <path d="M100 64 C96 56 89 50 87 42 C85 35 88 31 92 36 C95 40 97 50 100 64Z"
        fill="#FF6600" filter="url(#glow)" opacity="0.80"/>
  <!-- Flamme droite crête -->
  <path d="M100 64 C104 56 111 50 113 42 C115 35 112 31 108 36 C105 40 103 50 100 64Z"
        fill="#FF6600" filter="url(#glow)" opacity="0.80"/>
  <!-- Petite flamme gauche -->
  <path d="M96 66 C92 60 86 56 85 48 C84 42 87 39 90 44"
        fill="none" stroke="#FFA040" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <!-- Petite flamme droite -->
  <path d="M104 66 C108 60 114 56 115 48 C116 42 113 39 110 44"
        fill="none" stroke="#FFA040" stroke-width="2" stroke-linecap="round" opacity="0.65"/>

  <!-- Œil -->
  <circle cx="96" cy="74" r="3.5" fill="#FFF5E0"/>
  <circle cx="96" cy="74" r="2"   fill="#1A0800"/>
  <circle cx="97" cy="73" r="0.8" fill="rgba(255,255,255,0.8)"/>

  <!-- Bec -->
  <path d="M88 80 C85 81 83 83 84 85 C85 87 88 86 91 83Z"
        fill="#FFB340"/>

  <!-- Poitrine — reflet lumineux -->
  <ellipse cx="100" cy="102" rx="10" ry="14"
           fill="radial-gradient(circle, rgba(255,200,80,0.3) 0%, transparent 70%)"
           opacity="0.4"/>
  <ellipse cx="99" cy="99" rx="5" ry="7" fill="rgba(255,200,80,0.20)"/>
</svg>
